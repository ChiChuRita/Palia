name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check formatting
            script: format:check
          - name: Lint
            script: lint
          - name: Type check
            script: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js (latest LTS, from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ${{ matrix.name }}
        run: npm run ${{ matrix.script }}
